<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayRoom Downloads</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111;
    color:white;
}

/* Top bar */
.topbar{
    display:flex;
    justify-content:space-between;

}

.logo{
    font-size:1.8rem;

.nav{

    gap:20px;

.nav a{
    text-decoration:none;
    color:white;
    padding:8px 14px;
    border-radius:8px;
    transition:0.25s;
}

.nav a:hover{
    color:#b0b0b0;
    background:rgba(255,255,255,0.1);
}

.container{
    padding:60px 30px;
}

    background:#222;

    border-radius:12px;
    max-width:400px;
}

button{
    margin-top:10px;
    padding:10px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#333;
    color:white;
    transition:0.25s;
}

button:hover{
    color:#b0b0b0;
    background:#444;
}

<body>

<div class="topbar">
